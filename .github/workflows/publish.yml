name: Publication programmee

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Publier les brouillons arrives a echeance
        run: python3 scripts/publish_scheduled.py

      - name: Enregistrer les changements si necessaire
        run: |
          git config user.name "the-fridge-moment-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Publication programmee automatique"
          git push
